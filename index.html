<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSM CLOUD HUB v7.4 - SÉCURISÉ</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508; --accent: #00f2ff; --card-bg: rgba(20, 28, 42, 0.95);
            --card-border: rgba(255, 255, 255, 0.1); --text-main: #ffffff;
            --danger: #ff4757; --success: #2ed573; --dim: #64748b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 15px; padding-top: 60px; }
        
        #cloud-status { position: fixed; top: 0; left: 0; right: 0; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 800; z-index: 2000; background: rgba(0,0,0,0.95); border-bottom: 1px solid var(--card-border); }
        .sync-ok { color: var(--success); }
        .sync-load { color: var(--accent); }

        .nav-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .nav-btn { flex: 1; background: var(--card-bg); color: var(--dim); border: 1px solid var(--card-border); padding: 12px; border-radius: 10px; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; }
        .nav-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0, 242, 255, 0.05); }

        .filter-bar { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 8px; }
        .filter-chip { padding: 6px 15px; border-radius: 20px; background: var(--card-bg); border: 1px solid var(--card-border); font-size: 0.65rem; font-weight: 800; white-space: nowrap; color: var(--dim); cursor: pointer; }
        .filter-chip.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .glass-panel { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 15px; margin-bottom: 20px; }
        input { background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-size: 0.9rem; }
        
        button { background: var(--accent); color: #000; font-weight: 800; padding: 12px; border-radius: 8px; border: none; text-transform: uppercase; font-size: 0.7rem; cursor: pointer; }
        .btn-full { width: 100%; margin-top: 5px; }
        .btn-del { background: var(--danger) !important; color: white !important; padding: 5px 10px; font-size: 0.6rem; }

        .order-card { background: var(--card-bg); border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--card-border); overflow: hidden; }
        .card-header { padding: 12px; background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--card-border); }
        .cat-tag { font-size: 0.55rem; background: var(--accent); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: 800; margin-left: 8px; text-transform: uppercase; }

        .status-grid { display: grid; grid-template-columns: repeat(4, 1fr); }
        .status-btn { padding: 10px; text-align: center; font-size: 0.6rem; font-weight: 800; border-right: 1px solid var(--card-border); border-bottom: 1px solid var(--card-border); color: var(--dim); opacity: 0.3; text-transform: uppercase; }
        .status-btn.done { opacity: 1; color: var(--success); background: rgba(46, 213, 115, 0.1); }

        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th { padding: 8px; color: var(--dim); font-size: 0.55rem; text-transform: uppercase; }
        td { padding: 4px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.03); }
        
        .data-cell { width: 42px; height: 32px; background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); border-radius: 5px; text-align: center; color: white; font-family: 'JetBrains Mono'; }
        /* Style pour les champs verrouillés */
        .data-cell:disabled { opacity: 0.1; background: transparent; border: 1px dashed rgba(255,255,255,0.05); color: rgba(255,255,255,0.2); }
        
        .total-row { color: var(--accent); font-weight: 800; background: rgba(0, 242, 255, 0.05); }
        .signature { text-align: center; color: var(--dim); font-size: 0.6rem; padding: 40px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body onload="initApp()">

<div id="cloud-status">INITIALISATION...</div>

<div class="nav-tabs">
    <button id="tab-p" class="nav-btn active" onclick="switchTab('prod')">Production</button>
    <button id="tab-a" class="nav-btn" onclick="switchTab('arch')">Archives</button>
</div>

<div id="section-prod">
    <div class="glass-panel">
        <input type="password" id="pass" placeholder="CODE SECTEUR">
        <div style="display:flex; gap:10px;">
            <button class="btn-full" onclick="login()">ENTRER</button>
            <button class="btn-full" style="background:var(--dim); color:white" onclick="pullData()">🔄 SYNC</button>
        </div>
    </div>

    <div id="creation-zone" class="glass-panel" style="display:none">
        <input type="text" id="c-num" placeholder="N° COMMANDE">
        <input type="text" id="c-client" placeholder="NOM CLIENT">
        <input type="text" id="c-cat" placeholder="TYPE DE VÊTEMENT (EX: ROBE, POLO...)">
        <input type="text" id="c-tailles" placeholder="TAILLES (Ex: S, M, L, XL)">
        <button class="btn-full" style="background:var(--success)" onclick="createOrder()">LANCER LA FABRICATION</button>
    </div>

    <div class="filter-bar" id="category-filters"></div>
    <div id="prod-list"></div>
</div>

<div id="section-arch" style="display:none">
    <input type="text" id="search" placeholder="🔍 Rechercher client ou n°..." oninput="renderArchives()">
    <div id="arch-list"></div>
</div>

<div class="signature">SSM CLOUD HUB // v7.4</div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbxVCFe2eAIuMscUhVKqUqN1v6fAl2lRtLPvFdjouhMMg8_yBByb1Yqe3GX9opUx40km/exec";
    
    let appData = { prod: [], arch: [] };
    let role = "";
    let currentFilter = "TOUS";
    const sectors = { '1111': 'coupe', '2222': 'couture', '3333': 'logo', '4444': 'finition' };

    async function initApp() {
        const local = localStorage.getItem('ssm_v7_backup');
        if(local) { appData = JSON.parse(local); renderProd(); }
        await pullData();
    }

    async function pullData() {
        setStatus("SYNCHRONISATION...", "sync-load");
        try {
            const resp = await fetch(CLOUD_URL, { method: "POST", body: JSON.stringify({ action: "load" }) });
            const data = await resp.json();
            if(data) {
                appData = data;
                localStorage.setItem('ssm_v7_backup', JSON.stringify(appData));
                renderProd();
                setStatus("CLOUD SYNCHRONISÉ", "sync-ok");
            }
        } catch (e) { setStatus("MODE HORS-LIGNE", "sync-load"); }
    }

    async function pushData() {
        localStorage.setItem('ssm_v7_backup', JSON.stringify(appData));
        setStatus("ENVOI...", "sync-load");
        try {
            await fetch(CLOUD_URL, { method: "POST", mode: 'no-cors', body: JSON.stringify({ action: "save", payload: appData }) });
            setStatus("SAUVEGARDÉ", "sync-ok");
        } catch (e) { setStatus("ERREUR ENVOI", "sync-load"); }
    }

    function setStatus(t, c) {
        const s = document.getElementById('cloud-status');
        if(s) { s.innerText = t; s.className = c; }
    }

    function login() {
        role = sectors[document.getElementById('pass').value] || "";
        if(role) {
            document.getElementById('creation-zone').style.display = (role === 'coupe' ? 'block' : 'none');
            renderProd();
            alert("ACCÈS : " + role.toUpperCase());
        } else { alert("Code invalide"); }
    }

    // FONCTION CRITIQUE : Vérifie si le champ doit être verrouillé
    function isLocked(field) {
        if (!role) return true; // Tout verrouillé si pas connecté
        if (role === 'coupe' && field === 'c') return false;
        if (role === 'couture' && (field === 'cok' || field === 'crb')) return false;
        if (role === 'logo' && (field === 'lok' || field === 'lrb')) return false;
        if (role === 'finition' && (field === 'fok' || field === 'frb')) return false;
        return true; // Par défaut, verrouillé
    }

    function createOrder() {
        const n = document.getElementById('c-num').value, 
              c = document.getElementById('c-client').value, 
              t = document.getElementById('c-tailles').value, 
              cat = document.getElementById('c-cat').value.toUpperCase().trim();
        
        if(!n || !c || !t || !cat) return alert("Remplis tous les champs !");
        
        appData.prod.push({
            id: Date.now(), num: n, client: c.toUpperCase(), cat: cat,
            data: t.split(',').map(s => ({ t:s.trim(), c:0, cok:0, crb:0, lok:0, lrb:0, fok:0, frb:0 })),
            status: { coupe:'', couture:'', logo:'', finition:'' }
        });
        
        document.getElementById('c-num').value = "";
        document.getElementById('c-client').value = "";
        document.getElementById('c-cat').value = "";
        renderProd(); pushData();
    }

    function renderProd() {
        const catsExistantes = [...new Set(appData.prod.map(f => f.cat))].filter(c => c);
        const cats = ["TOUS", ...catsExistantes.sort()];
        
        document.getElementById('category-filters').innerHTML = cats.map(c => 
            `<div class="filter-chip ${currentFilter === c ? 'active' : ''}" onclick="setFilter('${c}')">${c}</div>`
        ).join('');

        const container = document.getElementById('prod-list');
        const filtered = currentFilter === "TOUS" ? appData.prod : appData.prod.filter(f => f.cat === currentFilter);

        container.innerHTML = filtered.slice().reverse().map(f => {
            const s = {c:0, cok:0, crb:0, lok:0, lrb:0, fok:0, frb:0};
            f.data.forEach(r => { s.c+=r.c; s.cok+=r.cok; s.crb+=r.crb; s.lok+=r.lok; s.lrb+=r.lrb; s.fok+=r.fok; s.frb+=r.frb; });
            
            return `
            <div class="order-card">
                <div class="card-header">
                    <div><strong>#${f.num}</strong> ${f.client}<span class="cat-tag">${f.cat}</span></div>
                    <div style="display:flex; gap:8px;">
                        <button style="background:var(--success); color:#000; padding:5px 10px; font-size:0.6rem" onclick="archiveOrder(${f.id})">TERMINER</button>
                        ${role === 'coupe' ? `<button class="btn-del" onclick="deleteOrder(${f.id}, 'prod')">X</button>` : ''}
                    </div>
                </div>
                <div class="status-grid">
                    ${['coupe','couture','logo','finition'].map(st => `
                        <div class="status-btn ${f.status[st]}" onclick="${role === st ? `toggleStatus(${f.id},'${st}')` : `alert('Action réservée au secteur ${st}')`}">
                            ${st}
                        </div>
                    `).join('')}
                </div>
                <div style="padding:10px; overflow-x:auto">
                    <table>
                        <tr><th>T</th><th>C</th><th>CO</th><th>RB</th><th>L</th><th>RB</th><th>F</th><th>RB</th></tr>
                        ${f.data.map((r, i) => `<tr>
                            <td style="font-weight:800; color:var(--accent)">${r.t}</td>
                            <td><input type="tel" class="data-cell" ${isLocked('c') ? 'disabled' : ''} value="${r.c}" onchange="upd(${f.id},${i},'c',this.value)"></td>
                            <td><input type="tel" class="data-cell" ${isLocked('cok') ? 'disabled' : ''} value="${r.cok}" onchange="upd(${f.id},${i},'cok',this.value)"></td>
                            <td><input type="tel" class="data-cell" ${isLocked('crb') ? 'disabled' : ''} style="color:var(--danger)" value="${r.crb}" onchange="upd(${f.id},${i},'crb',this.value)"></td>
                            <td><input type="tel" class="data-cell" ${isLocked('lok') ? 'disabled' : ''} value="${r.lok}" onchange="upd(${f.id},${i},'lok',this.value)"></td>
                            <td><input type="tel" class="data-cell" ${isLocked('lrb') ? 'disabled' : ''} style="color:var(--danger)" value="${r.lrb}" onchange="upd(${f.id},${i},'lrb',this.value)"></td>
                            <td><input type="tel" class="data-cell" ${isLocked('fok') ? 'disabled' : ''} value="${r.fok}" onchange="upd(${f.id},${i},'fok',this.value)"></td>
                            <td><input type="tel" class="data-cell" ${isLocked('frb') ? 'disabled' : ''} style="color:var(--danger)" value="${r.frb}" onchange="upd(${f.id},${i},'frb',this.value)"></td>
                        </tr>`).join('')}
                        <tr class="total-row"><td>Σ</td><td>${s.c}</td><td>${s.cok}</td><td>${s.crb}</td><td>${s.lok}</td><td>${s.lrb}</td><td>${s.fok}</td><td>${s.frb}</td></tr>
                    </table>
                </div>
            </div>`;
        }).join('');
    }

    function setFilter(c) { currentFilter = c; renderProd(); }

    function upd(fid, idx, field, val) {
        const f = appData.prod.find(x => x.id === fid);
        if(f) { f.data[idx][field] = parseInt(val) || 0; renderProd(); pushData(); }
    }

    function toggleStatus(fid, s) {
        const f = appData.prod.find(x => x.id === fid);
        if(f) { f.status[s] = f.status[s] === 'done' ? '' : 'done'; renderProd(); pushData(); }
    }

    function archiveOrder(fid) {
        if(!confirm("Envoyer aux archives ?")) return;
        const idx = appData.prod.findIndex(x => x.id === fid);
        appData.arch.push(appData.prod[idx]);
        appData.prod.splice(idx, 1);
        renderProd(); pushData();
    }

    function deleteOrder(fid, type) {
        if(!confirm("Supprimer définitivement cette fiche ?")) return;
        if(type === 'prod') appData.prod = appData.prod.filter(x => x.id !== fid);
        else appData.arch = appData.arch.filter(x => x.id !== fid);
        renderProd(); renderArchives(); pushData();
    }

    function renderArchives() {
        const s = document.getElementById('search').value.toLowerCase();
        document.getElementById('arch-list').innerHTML = appData.arch.slice().reverse()
            .filter(a => a.client.toLowerCase().includes(s) || a.num.toLowerCase().includes(s))
            .map(a => `<div class="glass-panel" style="display:flex; justify-content:space-between; align-items:center;">
                <div><strong>#${a.num}</strong> - ${a.client} <span class="cat-tag" style="background:#444; color:white">${a.cat}</span></div>
                <button class="btn-del" onclick="deleteOrder(${a.id}, 'arch')">X</button>
            </div>`).join('');
    }

    function switchTab(t) {
        document.getElementById('section-prod').style.display = t === 'prod' ? 'block' : 'none';
        document.getElementById('section-arch').style.display = t === 'arch' ? 'block' : 'none';
        document.getElementById('tab-p').className = 'nav-btn ' + (t==='prod'?'active':'');
        document.getElementById('tab-a').className = 'nav-btn ' + (t==='arch'?'active':'');
        if(t === 'arch') renderArchives();
    }
    
    setInterval(async () => { 
        if (document.activeElement.tagName !== 'INPUT') await pullData(); 
    }, 60000);
</script>
</body>
</html>
