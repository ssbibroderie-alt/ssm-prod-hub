<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSM // CLOUD HUB v6.0</title>

    <link rel="manifest" href='data:application/manifest+json,{"name":"Shin Sekai Master","short_name":"SSM","start_url":".","display":"standalone","background_color":"#030508","theme_color":"#00f2ff","icons":[{"src":"https://via.placeholder.com/192/00f2ff/000000?text=SSM","sizes":"192x192","type":"image/png"}]}'>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('data:application/javascript,self.addEventListener("fetch", (e) => { e.respondWith(fetch(e.request)); });');
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --bg: #030508; --accent: #00f2ff; --card-bg: rgba(20, 28, 42, 0.95);
            --card-border: rgba(255, 255, 255, 0.1); --text-main: #ffffff;
            --danger: #ff4757; --success: #2ed573; --dim: #64748b;
        }
        * { box-sizing: border-box; outline: none; }
        ::-webkit-scrollbar { display: none; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 20px; }
        
        /* Navigation */
        .nav-tabs { display: flex; gap: 15px; margin-bottom: 25px; border-bottom: 1px solid var(--card-border); }
        .nav-btn { background: transparent; color: var(--dim); border: none; padding: 12px 25px; cursor: pointer; font-weight: 800; text-transform: uppercase; font-size: 0.8rem; }
        .nav-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        /* Panels */
        .glass-panel { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; margin-bottom: 25px; }
        .data-cell { width: 60px; height: 40px; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--card-border); border-radius: 8px; color: #fff; font-family: 'JetBrains Mono'; text-align: center; font-size: 1rem; }
        .view-only { pointer-events: none; border: none !important; background: transparent !important; opacity: 1; font-weight: 800; }
        
        /* Cards */
        .order-card { background: var(--card-bg); border: 2px solid var(--accent); border-radius: 20px; overflow: hidden; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0, 242, 255, 0.05); border-bottom: 1px solid var(--card-border); }
        
        /* Status Bar */
        .status-grid { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid var(--card-border); }
        .status-btn { padding: 12px; text-align: center; font-size: 0.7rem; font-weight: 800; border-right: 1px solid var(--card-border); color: #64748b; cursor: pointer; text-transform: uppercase; }
        .status-btn.done { color: var(--success); background: rgba(46, 213, 115, 0.1); text-decoration: underline; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; }
        th { font-size: 0.6rem; color: var(--dim); padding: 10px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 8px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .total-row { background: rgba(0, 242, 255, 0.1); font-weight: 800; color: var(--accent); border-top: 2px solid var(--accent); }

        /* Buttons & UI */
        button { background: var(--accent); color: #000; font-weight: 800; padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; transition: 0.3s; }
        button:active { transform: scale(0.95); }
        .btn-del { background: var(--danger) !important; color: white !important; }
        .btn-pdf { background: #ff4757 !important; color: white !important; }
        
        /* Modals */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); padding: 20px; overflow-y: auto; }
        .modal-content { background: var(--bg); max-width: 900px; margin: auto; border: 2px solid var(--accent); border-radius: 20px; padding: 20px; position: relative; }
        .close { position: absolute; right: 20px; top: 15px; color: var(--danger); font-size: 2rem; cursor: pointer; }

        /* Cloud Status */
        #cloud-status { position: fixed; top: 10px; right: 10px; font-size: 0.6rem; padding: 5px 12px; border-radius: 20px; background: rgba(0,0,0,0.8); z-index: 2000; font-weight: 800; }
        .sync-ok { color: var(--success); border: 1px solid var(--success); }
        .sync-load { color: var(--accent); border: 1px solid var(--accent); }
        
        .signature { text-align: center; margin-top: 50px; padding: 20px; font-size: 0.7rem; color: #64748b; letter-spacing: 3px; font-weight: 800; border-top: 1px solid var(--card-border); }
        #pdf-export-zone { position: absolute; left: -9999px; top: -9999px; width: 800px; background: white; }
        
        input[type="text"], input[type="tel"] { border: 1px solid var(--card-border); border-radius: 8px; background: rgba(255,255,255,0.05); color: white; padding: 10px; }
    </style>
</head>
<body onload="initCloud()">

<div id="cloud-status" class="sync-ok">INITIALISATION...</div>

<div class="nav-tabs">
    <button id="btn-prod" class="nav-btn active" onclick="switchTab('prod')">Production</button>
    <button id="btn-archive" class="nav-btn" onclick="switchTab('archive')">Archives</button>
</div>

<div id="section-prod" style="display:block">
    <div class="auth-box glass-panel" style="display:flex; align-items:center; gap:10px; justify-content: center; flex-wrap: wrap;">
        <input type="password" id="pass" placeholder="CODE SECTEUR" style="width: 140px; text-align: center;">
        <button onclick="login()">ENTRER</button>
        <button onclick="pullData()" style="background:var(--dim); color:white;">🔄 REFRESH</button>
    </div>

    <div id="creation-sector" class="glass-panel" style="display:none">
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
            <input type="text" id="c-num" placeholder="N° COMMANDE">
            <input type="text" id="c-client" placeholder="NOM CLIENT">
            <input type="text" id="c-cat" placeholder="CATÉGORIE (Ex: T-SHIRT)">
            <input type="text" id="c-tailles" placeholder="TAILLES (Ex: S,M,L,XL)">
        </div>
        <button id="btn-submit" onclick="ajouterFiche()" style="width:100%; margin-top:15px; background: var(--success); color:black;">LANCER LA PRODUCTION</button>
    </div>
    <div id="prod-container"></div>
</div>

<div id="section-archive" style="display:none">
    <div class="glass-panel">
        <input type="text" id="search-input" style="width:100%; padding:15px; margin-bottom:20px;" placeholder="🔍 RECHERCHER UN CLIENT OU UN N°..." oninput="renderArchives()">
        <div id="archive-list"></div>
    </div>
</div>

<div id="viewModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modal-body"></div>
    </div>
</div>

<div id="pdf-export-zone"></div>

<div class="signature"> [ 2026-03-09 ] — SHIN SEKAI MASTER CLOUD — v6.0 </div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbx7f3-CnYPrNkwO5RqfcWQL2tePjYx6l3WMDId92zZ5z3WeSfbciIWLBBpwM1yrUSPM/exec";
    let role = "";
    let appData = { prod: [], arch: [] };
    const sectors = { '1111': 'coupe', '2222': 'couture', '3333': 'logo', '4444': 'finition' };

    async function initCloud() { await pullData(); }

    async function pullData() {
        setSyncStatus("CHARGEMENT...", "sync-load");
        try {
            const resp = await fetch(CLOUD_URL, { method: "POST", body: JSON.stringify({ action: "load" }) });
            const data = await resp.json();
            if(data) { 
                appData.prod = data.prod || []; 
                appData.arch = data.arch || []; 
            }
            renderProd();
            setSyncStatus("SYNCHRONISÉ", "sync-ok");
        } catch (e) { setSyncStatus("ERREUR RÉSEAU", "sync-load"); }
    }

    async function pushData() {
        // Sécurité anti-effacement : ne jamais envoyer si les deux listes sont vides par erreur technique
        if (appData.prod.length === 0 && appData.arch.length === 0) return;
        
        setSyncStatus("ENVOI CLOUD...", "sync-load");
        try {
            await fetch(CLOUD_URL, { 
                method: "POST", 
                mode: 'no-cors',
                body: JSON.stringify({ action: "save", payload: appData }) 
            });
            setSyncStatus("SYNCHRONISÉ", "sync-ok");
        } catch (e) { setSyncStatus("ERREUR CLOUD", "sync-load"); }
    }

    function setSyncStatus(txt, cls) {
        const s = document.getElementById('cloud-status');
        if(s) { s.innerText = txt; s.className = cls; }
    }

    function login() {
        role = sectors[document.getElementById('pass').value] || "";
        if(role) {
            document.getElementById('creation-sector').style.display = (role === 'coupe' ? 'block' : 'none');
            renderProd();
            alert("Connecté Secteur : " + role.toUpperCase());
        } else { alert("Code invalide"); }
    }

    async function ajouterFiche() {
        const n = document.getElementById('c-num').value, c = document.getElementById('c-client').value, t = document.getElementById('c-tailles').value;
        if(!n || !c || !t) { alert("Champs manquants"); return; }
        
        appData.prod.push({
            id: Date.now(),
            num: n,
            client: c.toUpperCase(),
            cat: document.getElementById('c-cat').value.toUpperCase(),
            data: t.split(',').map(s => ({ t:s.trim(), c:0, cok:0, crb:0, lok:0, lrb:0, fok:0, frb:0 })),
            status: { coupe:'', couture:'', logo:'', finition:'' }
        });
        
        // Reset champs
        document.getElementById('c-num').value = "";
        document.getElementById('c-client').value = "";
        
        renderProd();
        await pushData();
    }

    function getFicheHTML(f, isView) {
        const sums = {c:0, cok:0, crb:0, lok:0, lrb:0, fok:0, frb:0};
        f.data.forEach(r => { sums.c+=r.c; sums.cok+=r.cok; sums.crb+=r.crb; sums.lok+=r.lok; sums.lrb+=r.lrb; sums.fok+=r.fok; sums.frb+=r.frb; });
        
        return `
        <div class="order-card">
            <div class="card-header">
                <div><strong>#${f.num} — ${f.client}</strong> <br><small>${f.cat}</small></div>
                ${!isView ? `<div>
                    <button onclick="archiver(${f.id})" style="background:var(--success); color:black;">ARCHIVER</button>
                    ${role==='coupe' ? `<button onclick="supprP(${f.id})" class="btn-del">X</button>` : ''}
                </div>` : ''}
            </div>
            <div class="status-grid">
                ${['coupe','couture','logo','finition'].map(s => `<div class="status-btn ${f.status[s]}" onclick="${!isView?`toggleS(${f.id},'${s}')`:''}">${s}</div>`).join('')}
            </div>
            <div style="padding:15px; overflow-x:auto;">
                <table>
                    <thead>
                        <tr><th>Taille</th><th>Coupe</th><th colspan="2">Couture</th><th colspan="2">Logo</th><th colspan="2">Finis.</th></tr>
                        <tr style="font-size:0.5rem; color:var(--dim);"><th></th><th>OK</th><th>OK</th><th>RB</th><th>OK</th><th>RB</th><th>OK</th><th>RB</th></tr>
                    </thead>
                    <tbody>
                        ${f.data.map((r, i) => `<tr>
                            <td style="font-weight:800; color:var(--accent)">${r.t}</td>
                            <td><input type="tel" class="data-cell ${role!=='coupe'||isView?'view-only':''}" value="${r.c}" onchange="upd(${f.id},${i},'c',this.value)"></td>
                            <td><input type="tel" class="data-cell ${role!=='couture'||isView?'view-only':''}" value="${r.cok}" onchange="upd(${f.id},${i},'cok',this.value)"></td>
                            <td><input type="tel" class="data-cell ${role!=='couture'||isView?'view-only':''}" style="color:var(--danger)" value="${r.crb}" onchange="upd(${f.id},${i},'crb',this.value)"></td>
                            <td><input type="tel" class="data-cell ${role!=='logo'||isView?'view-only':''}" value="${r.lok}" onchange="upd(${f.id},${i},'lok',this.value)"></td>
                            <td><input type="tel" class="data-cell ${role!=='logo'||isView?'view-only':''}" style="color:var(--danger)" value="${r.lrb}" onchange="upd(${f.id},${i},'lrb',this.value)"></td>
                            <td><input type="tel" class="data-cell ${role!=='finition'||isView?'view-only':''}" value="${r.fok}" onchange="upd(${f.id},${i},'fok',this.value)"></td>
                            <td><input type="tel" class="data-cell ${role!=='finition'||isView?'view-only':''}" style="color:var(--danger)" value="${r.frb}" onchange="upd(${f.id},${i},'frb',this.value)"></td>
                        </tr>`).join('')}
                    </tbody>
                    <tr class="total-row"><td>TOTAL</td><td>${sums.c}</td><td>${sums.cok}</td><td>${sums.crb}</td><td>${sums.lok}</td><td>${sums.lrb}</td><td>${sums.fok}</td><td>${sums.frb}</td></tr>
                </table>
            </div>
        </div>`;
    }

    function renderProd() { 
        document.getElementById('prod-container').innerHTML = appData.prod.slice().reverse().map(f => getFicheHTML(f, false)).join(''); 
    }

    function upd(fid, idx, field, val) {
        const f = appData.prod.find(x => x.id === fid);
        if(f) { 
            f.data[idx][field] = parseInt(val) || 0; 
            pushData(); 
            renderProd(); 
        }
    }

    function toggleS(fid, s) {
        const f = appData.prod.find(x => x.id === fid);
        if(f) { 
            f.status[s] = f.status[s] === 'done' ? '' : 'done'; 
            pushData(); 
            renderProd(); 
        }
    }

    async function archiver(fid) {
        if(!confirm("Envoyer vers les archives ?")) return;
        const fIndex = appData.prod.findIndex(x => x.id === fid);
        if(fIndex > -1) {
            appData.arch.push(appData.prod[fIndex]);
            appData.prod.splice(fIndex, 1);
            await pushData();
            renderProd();
        }
    }

    function renderArchives() {
        const s = document.getElementById('search-input').value.toLowerCase();
        document.getElementById('archive-list').innerHTML = appData.arch.slice().reverse()
            .filter(a => a.client.toLowerCase().includes(s) || a.num.toLowerCase().includes(s))
            .map(a => `<div class="glass-panel" style="display:flex; justify-content:space-between; align-items:center;">
                <div><strong>#${a.num}</strong> - ${a.client}</div>
                <div style="display:flex; gap:5px;">
                    <button onclick="openV(${a.id})" style="background:var(--dim); color:white;">VOIR</button>
                    <button onclick="supprA(${a.id})" class="btn-del">X</button>
                </div>
            </div>`).join('');
    }

    async function supprA(fid) { if(confirm("Supprimer l'archive ?")) { appData.arch = appData.arch.filter(x => x.id !== fid); await pushData(); renderArchives(); } }
    async function supprP(fid) { if(confirm("Supprimer la fiche active ?")) { appData.prod = appData.prod.filter(x => x.id !== fid); await pushData(); renderProd(); } }
    
    function openV(fid) { 
        const a = appData.arch.find(x => x.id === fid); 
        document.getElementById('modal-body').innerHTML = getFicheHTML(a, true); 
        document.getElementById('viewModal').style.display = "block"; 
    }
    
    function closeModal() { document.getElementById('viewModal').style.display = "none"; }
    
    function switchTab(v) {
        document.getElementById('section-prod').style.display = (v === 'prod' ? 'block' : 'none');
        document.getElementById('section-archive').style.display = (v === 'archive' ? 'block' : 'none');
        document.getElementById('btn-prod').classList.toggle('active', v==='prod');
        document.getElementById('btn-archive').classList.toggle('active', v==='archive');
        if(v === 'archive') renderArchives();
    }

    // Auto-Sync toutes les 60 secondes pour mettre à jour les écrans des collègues
    setInterval(async () => { 
        if (document.activeElement.tagName !== 'INPUT') await pullData(); 
    }, 60000);
</script>
</body>
</html>
