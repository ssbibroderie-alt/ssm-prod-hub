<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SSM CLOUD HUB v8.0 - FINAL FIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508; --accent: #00f2ff; --card-bg: rgba(20, 28, 42, 0.95);
            --card-border: rgba(255, 255, 255, 0.1); --text-main: #ffffff;
            --danger: #ff4757; --success: #2ed573; --dim: #64748b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 15px; padding-top: 110px; }
        
        .fixed-header { position: fixed; top: 0; left: 0; right: 0; z-index: 2000; background: rgba(0,0,0,0.95); border-bottom: 1px solid var(--card-border); padding: 5px 15px; }
        #cloud-status { height: 25px; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 800; }
        .sync-ok { color: var(--success); }
        .sync-load { color: var(--accent); }

        .global-search { background: rgba(255,255,255,0.08); border: 1px solid var(--accent); color: var(--accent); padding: 10px; border-radius: 8px; width: 100%; font-size: 0.8rem; margin-bottom: 5px; font-weight: 600; }

        .nav-tabs { display: flex; gap: 8px; margin-bottom: 15px; }
        .nav-btn { flex: 1; background: var(--card-bg); color: var(--dim); border: 1px solid var(--card-border); padding: 12px; border-radius: 10px; font-weight: 800; font-size: 0.7rem; text-transform: uppercase; }
        .nav-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0, 242, 255, 0.05); }

        .glass-panel { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; padding: 15px; margin-bottom: 20px; }
        input[type="text"], input[type="password"] { background: rgba(255,255,255,0.05); border: 1px solid var(--card-border); color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        
        button { background: var(--accent); color: #000; font-weight: 800; padding: 12px; border-radius: 8px; border: none; text-transform: uppercase; cursor: pointer; }
        .btn-full { width: 100%; margin-top: 5px; }

        .order-card { background: var(--card-bg); border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--card-border); overflow: hidden; border-left: 4px solid var(--accent); }
        .card-header { padding: 12px; background: rgba(255,255,255,0.02); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--card-border); }
        
        /* BADGE CATÉGORIE RE-AJOUTÉ */
        .cat-tag { font-size: 0.6rem; background: var(--accent); color: #000; padding: 3px 8px; border-radius: 4px; font-weight: 800; text-transform: uppercase; margin-left: 10px; }

        .status-grid { display: grid; grid-template-columns: repeat(4, 1fr); }
        .status-btn { padding: 10px; text-align: center; font-size: 0.6rem; font-weight: 800; border-right: 1px solid var(--card-border); border-bottom: 1px solid var(--card-border); color: var(--dim); opacity: 0.3; }
        .status-btn.done { opacity: 1; color: var(--success); background: rgba(46, 213, 115, 0.1); }

        table { width: 100%; border-collapse: collapse; }
        th { padding: 8px; color: var(--dim); font-size: 0.55rem; text-transform: uppercase; }
        td { padding: 4px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.03); }
        
        .data-cell { width: 42px; height: 32px; background: rgba(255,255,255,0.12); border: 1px solid var(--card-border); border-radius: 5px; text-align: center; color: #ffffff !important; font-family: 'JetBrains Mono'; font-weight: 700; font-size: 0.9rem; }
        .data-cell:read-only { background: rgba(255,255,255,0.02); border-color: transparent; outline: none; }
        
        .total-row { background: rgba(0, 242, 255, 0.08); font-weight: 800; color: var(--accent); font-family: 'JetBrains Mono'; font-size: 0.8rem; }
        .total-row td { border-top: 1px solid var(--accent); padding: 8px 4px; }

        .signature { text-align: center; color: var(--dim); font-size: 0.7rem; padding: 40px; border-top: 1px solid var(--card-border); margin-top: 20px; }
    </style>
</head>
<body onload="initApp()">

<div class="fixed-header">
    <div id="cloud-status">INITIALISATION...</div>
    <input type="text" id="global-search" class="global-search" placeholder="🔍 RECHERCHE NOM OU N°..." oninput="runSearch()">
</div>

<div class="nav-tabs">
    <button id="tab-p" class="nav-btn active" onclick="switchTab('prod')">Production</button>
    <button id="tab-a" class="nav-btn" onclick="switchTab('arch')">Archives</button>
</div>

<div id="section-prod">
    <div class="glass-panel">
        <input type="password" id="pass" placeholder="CODE SECTEUR">
        <button class="btn-full" onclick="login()">SE CONNECTER</button>
    </div>

    <div id="creation-zone" class="glass-panel" style="display:none">
        <input type="text" id="c-num" placeholder="N° COMMANDE">
        <input type="text" id="c-client" placeholder="NOM CLIENT">
        <input type="text" id="c-cat" placeholder="CATÉGORIE (Ex: POLO, VESTE)">
        <input type="text" id="c-tailles" placeholder="TAILLES (Ex: S, M, L)">
        <button class="btn-full" style="background:var(--success)" onclick="createOrder()">CRÉER LA FICHE</button>
    </div>

    <div id="prod-list"></div>
</div>

<div id="section-arch" style="display:none"><div id="arch-list"></div></div>

<div class="signature">2026-03-05 — SSM CLOUD HUB v8.0</div>

<script>
    const CLOUD_URL = "https://script.google.com/macros/s/AKfycbxVCFe2eAIuMscUhVKqUqN1v6fAl2lRtLPvFdjouhMMg8_yBByb1Yqe3GX9opUx40km/exec";
    let appData = { prod: [], arch: [] };
    let role = "";
    const sectors = { '1111': 'coupe', '2222': 'couture', '3333': 'logo', '4444': 'finition' };

    async function initApp() {
        const local = localStorage.getItem('ssm_backup');
        if(local) { appData = JSON.parse(local); runSearch(); }
        await pullData();
    }

    async function pullData() {
        try {
            const resp = await fetch(CLOUD_URL, { method: "POST", body: JSON.stringify({ action: "load" }) });
            const data = await resp.json();
            if(data) { appData = data; runSearch(); setStatus("SYNCHRO OK", "sync-ok"); }
        } catch (e) { setStatus("ERREUR CLOUD", "sync-load"); }
    }

    async function pushData() {
        localStorage.setItem('ssm_backup', JSON.stringify(appData));
        try { await fetch(CLOUD_URL, { method: "POST", mode: 'no-cors', body: JSON.stringify({ action: "save", payload: appData }) }); } catch (e) {}
    }

    function setStatus(t, c) { const s = document.getElementById('cloud-status'); s.innerText = t; s.className = c; }

    function login() {
        role = sectors[document.getElementById('pass').value] || "";
        if(role) {
            document.getElementById('creation-zone').style.display = (role === 'coupe' ? 'block' : 'none');
            runSearch();
            alert("SECTEUR ACTIF : " + role.toUpperCase());
        } else { alert("Code Erroné"); }
    }

    function isForbidden(field) {
        if (!role) return true; 
        if (role === 'coupe' && field === 'c') return false;
        if (role === 'couture' && (field === 'cok' || field === 'crb')) return false;
        if (role === 'logo' && (field === 'lok' || field === 'lrb')) return false;
        if (role === 'finition' && (field === 'fok' || field === 'frb')) return false;
        return true;
    }

    function createOrder() {
        const n = document.getElementById('c-num').value, c = document.getElementById('c-client').value, t = document.getElementById('c-tailles').value, cat = document.getElementById('c-cat').value.toUpperCase();
        if(!n || !c || !t) return;
        appData.prod.push({
            id: Date.now(), num: n, client: c.toUpperCase(), cat: cat || "N/A",
            data: t.split(',').map(s => ({ t:s.trim(), c:0, cok:0, crb:0, lok:0, lrb:0, fok:0, frb:0 })),
            status: { coupe:'', couture:'', logo:'', finition:'' }
        });
        document.getElementById('c-num').value=''; document.getElementById('c-client').value='';
        runSearch(); pushData();
    }

    function runSearch() {
        const query = document.getElementById('global-search').value.toLowerCase();
        const container = document.getElementById('prod-list');
        const filtered = appData.prod.filter(f => f.client.toLowerCase().includes(query) || f.num.toLowerCase().includes(query) || (f.cat && f.cat.toLowerCase().includes(query)));

        container.innerHTML = filtered.slice().reverse().map(f => {
            const s = {c:0, cok:0, crb:0, lok:0, lrb:0, fok:0, frb:0};
            f.data.forEach(r => { 
                s.c += r.c; s.cok += r.cok; s.crb += r.crb; 
                s.lok += r.lok; s.lrb += r.lrb; s.fok += r.fok; s.frb += r.frb; 
            });

            return `
            <div class="order-card">
                <div class="card-header">
                    <div><strong>#${f.num}</strong> ${f.client} <span class="cat-tag">${f.cat}</span></div>
                    <button style="background:var(--success); padding:5px; font-size:0.6rem" onclick="archiveOrder(${f.id})">FINIR</button>
                </div>
                <div class="status-grid">
                    ${['coupe','couture','logo','finition'].map(st => `
                        <div class="status-btn ${f.status[st]}" onclick="${role === st ? `toggleStatus(${f.id},'${st}')` : `alert('Action interdite')`}">
                            ${st.toUpperCase()}
                        </div>
                    `).join('')}
                </div>
                <div style="padding:10px; overflow-x:auto">
                    <table>
                        <tr><th>T</th><th>C</th><th>CO</th><th>RB</th><th>L</th><th>RB</th><th>F</th><th>RB</th></tr>
                        ${f.data.map((r, i) => `<tr>
                            <td style="color:var(--accent); font-weight:800">${r.t}</td>
                            <td><input type="tel" class="data-cell" ${isForbidden('c') ? 'readonly' : ''} value="${r.c}" onchange="upd(${f.id},${i},'c',this.value)"></td>
                            <td><input type="tel" class="data-cell" ${isForbidden('cok') ? 'readonly' : ''} value="${r.cok}" onchange="upd(${f.id},${i},'cok',this.value)"></td>
                            <td><input type="tel" class="data-cell" ${isForbidden('crb') ? 'readonly' : ''} style="color:var(--danger)!important" value="${r.crb}" onchange="upd(${f.id},${i},'crb',this.value)"></td>
                            <td><input type="tel" class="data-cell" ${isForbidden('lok') ? 'readonly' : ''} value="${r.lok}" onchange="upd(${f.id},${i},'lok',this.value)"></td>
                            <td><input type="tel" class="data-cell" ${isForbidden('lrb') ? 'readonly' : ''} style="color:var(--danger)!important" value="${r.lrb}" onchange="upd(${f.id},${i},'lrb',this.value)"></td>
                            <td><input type="tel" class="data-cell" ${isForbidden('fok') ? 'readonly' : ''} value="${r.fok}" onchange="upd(${f.id},${i},'fok',this.value)"></td>
                            <td><input type="tel" class="data-cell" ${isForbidden('frb') ? 'readonly' : ''} style="color:var(--danger)!important" value="${r.frb}" onchange="upd(${f.id},${i},'frb',this.value)"></td>
                        </tr>`).join('')}
                        <tr class="total-row">
                            <td>TOT</td>
                            <td>${s.c}</td>
                            <td>${s.cok}</td>
                            <td style="color:var(--danger)">${s.crb}</td>
                            <td>${s.lok}</td>
                            <td style="color:var(--danger)">${s.lrb}</td>
                            <td>${s.fok}</td>
                            <td style="color:var(--danger)">${s.frb}</td>
                        </tr>
                    </table>
                </div>
            </div>`;
        }).join('');
    }

    function upd(fid, idx, field, val) {
        const f = appData.prod.find(x => x.id === fid);
        if(f) { f.data[idx][field] = parseInt(val) || 0; runSearch(); pushData(); }
    }
    function toggleStatus(fid, s) {
        const f = appData.prod.find(x => x.id === fid);
        if(f) { f.status[s] = f.status[s] === 'done' ? '' : 'done'; runSearch(); pushData(); }
    }
    function archiveOrder(fid) {
        const idx = appData.prod.findIndex(x => x.id === fid);
        appData.arch.push(appData.prod[idx]);
        appData.prod.splice(idx, 1);
        runSearch(); pushData();
    }
    function switchTab(t) {
        document.getElementById('section-prod').style.display = t === 'prod' ? 'block' : 'none';
        document.getElementById('section-arch').style.display = t === 'arch' ? 'block' : 'none';
        document.getElementById('tab-p').classList.toggle('active', t === 'prod');
        document.getElementById('tab-a').classList.toggle('active', t === 'arch');
    }
</script>
</body>
</html>
